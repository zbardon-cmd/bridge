<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The BRIDGE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #F8F5F0; font-family: 'Georgia', serif; }

/* ---- LOGIN ---- */
#login {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: #F8F5F0;
}
.lcard {
  width: min(290px, 86vw);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 44px 30px;
  border: 1.5px solid rgba(26,63,160,.45); border-radius: 8px;
  background: #fff;
}
.ltitle { font-size: 22px; color: #1a3fa0; letter-spacing: .1em; }
.lsub   { font-size: 12px; color: #8890a8; font-style: italic; font-family: sans-serif; }
.lpw {
  width: 100%; padding: 10px 14px; border: 1.5px solid #ccd;
  border-radius: 6px; font-family: 'Georgia', serif; font-size: 15px;
  text-align: center; letter-spacing: .14em; background: #F8F5F0;
  outline: none; transition: border-color .2s;
}
.lpw:focus { border-color: #1a3fa0; }
.lbtn {
  width: 100%; padding: 10px; border: 1.5px solid #1a3fa0; border-radius: 6px;
  background: transparent; color: #1a3fa0; font-family: 'Georgia', serif;
  font-size: 14px; letter-spacing: .08em; cursor: pointer; transition: background .18s;
}
.lbtn:hover { background: #eaeff8; }
.lerr { font-size: 12px; color: #b02020; min-height: 16px; font-family: sans-serif; }

/* ---- MAIN ---- */
#face-wrap {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding-bottom: 190px;
}
#face-svg {
  height: 100%;
  max-height: calc(100vh - 210px);
  width: auto;
  max-width: 100vw;
}

/* ---- BOTTOM UI ---- */
#ui {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  flex-direction: column; gap: 8px;
  padding: 10px 14px 18px;
  background: rgba(248,245,240,.88);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  border-top: 1px solid rgba(26,63,160,.12); z-index: 10;
}
.ui-row { display: flex; align-items: center; gap: 10px; }
#status-label { flex: 1; font-size: 10px; color: #8890a8; letter-spacing: .18em; text-transform: uppercase; font-family: sans-serif; text-align: center; }
#mic-btn {
  width: 50px; height: 50px; border-radius: 50%;
  border: 1.5px solid rgba(26,63,160,.55); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #1a3fa0; transition: background .15s, transform .1s; flex-shrink: 0;
}
#mic-btn:hover { background: rgba(26,63,160,.07); }
#mic-btn:active { transform: scale(.95); }
#mic-btn.on { border-color: #b02020; background: rgba(176,32,32,.1); color: #b02020; }
#chat { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: rgba(26,63,160,.2); border-radius: 2px; }
.bub { padding: 7px 11px; border-radius: 8px; font-size: 13px; line-height: 1.55; max-width: 87%; animation: fu .18s ease; }
@keyframes fu { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.bub.user { align-self:flex-end; background:rgba(26,63,160,.07); border:1px solid rgba(26,63,160,.14); color:#1a2a5a; border-bottom-right-radius:3px; }
.bub.ai   { align-self:flex-start; background:#fff; border:1px solid rgba(26,63,160,.18); color:#1a2a5a; border-bottom-left-radius:3px; }
#hint { font-size:11px; color:#aab; text-align:center; font-style:italic; font-family:sans-serif; }
#ring { display:none; position:fixed; inset:0; pointer-events:none; z-index:5; border:2px solid rgba(26,63,160,.4); animation:rng 1.2s ease-in-out infinite; }
@keyframes rng { 0%,100%{opacity:.2} 50%{opacity:.9} }
#ring.on { display:block; }
</style>
</head>
<body>

<script>
// ============================================================
//  CONFIG
// ============================================================
const CFG = {
  password: 'malyprinc',
  proxyUrl: 'https://claudeproxy-5ba2ev6zxq-ew.a.run.app'
};

// ============================================================
//  STATE
// ============================================================
let cs = 'idle', recog = null;
let mouth = 0, tMouth = 0, speakT = 0;
let blinkAnim = null, blinkP = 0;
let eyeTarget = {x:0,y:0}, eyeCur = {x:0,y:0};
let saccadeT = 0;
let lastT = performance.now();
let afGo = false, blinkTmr;
let chatHistory = [];

// ============================================================
//  DOM
// ============================================================
const $login  = document.getElementById('login');
const $wrap   = document.getElementById('face-wrap');
const $ui     = document.getElementById('ui');
const $status = document.getElementById('status-label');
const $mic    = document.getElementById('mic-btn');
const $chat   = document.getElementById('chat');
const $hint   = document.getElementById('hint');
const $ring   = document.getElementById('ring');

const g = id => document.getElementById(id);

// ============================================================
//  LOGIN
// ============================================================
g('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function doLogin() {
  if (g('pw').value === CFG.password) {
    $login.style.display = 'none';
    $wrap.style.display = 'flex';
    $ui.style.display = 'flex';
    if (!afGo) { afGo=true; lastT=performance.now(); requestAnimationFrame(animLoop); }
    scheduleBlink();
  } else {
    g('lerr').textContent = 'Wrong password.';
    g('pw').value = '';
  }
}

// ============================================================
//  MOUTH ANIMATION
// ============================================================
function updateMouth(o) {
  const cx=140, topY=232, hw=28, mH=18;
  const openPx = o * 22;

  // Teeth
  const tRy = openPx * 0.36;
  const tRx = hw * 0.7 * Math.min(1, o * 1.6);
  g('teeth').setAttribute('rx', tRx.toFixed(1));
  g('teeth').setAttribute('ry', tRy.toFixed(1));
  g('teeth').setAttribute('cy', (topY + openPx * 0.08).toFixed(1));
  g('teeth').setAttribute('opacity', o > 0.18 ? '1' : '0');
  g('teeth').setAttribute('stroke-width', o > 0.18 ? '1' : '0');

  // Dark interior
  g('mouth-dark').setAttribute('rx', (hw * 0.56 * Math.min(1, o * 2.1)).toFixed(1));
  g('mouth-dark').setAttribute('ry', (openPx * 0.46).toFixed(1));
  g('mouth-dark').setAttribute('cy', (topY + openPx * 0.22).toFixed(1));

  // Lower lip drops down
  const d = openPx;
  const lp = `M ${cx-hw} ${topY} Q ${cx-hw*0.42} ${topY+d*0.52+mH*0.46} ${cx} ${topY+d+mH} Q ${cx+hw*0.42} ${topY+d*0.52+mH*0.46} ${cx+hw} ${topY} Q ${cx+hw*0.52} ${topY+mH*0.2} ${cx} ${topY+mH*0.24} Q ${cx-hw*0.52} ${topY+mH*0.2} ${cx-hw} ${topY} Z`;
  g('lip-lower').setAttribute('d', lp);
}

// ============================================================
//  BLINK
// ============================================================
function updateBlink(p) {
  g('lid-l').setAttribute('opacity', p.toFixed(3));
  g('lid-r').setAttribute('opacity', p.toFixed(3));
}

function scheduleBlink() {
  clearTimeout(blinkTmr);
  blinkTmr = setTimeout(() => { blinkAnim={t:0,dur:.13}; scheduleBlink(); }, 1800 + Math.random()*3600);
}

// ============================================================
//  EYE MOVEMENT
// ============================================================
function updateEyes(dx, dy) {
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  dx = clamp(dx, -5, 5); dy = clamp(dy, -4, 4);
  ['l','r'].forEach((s, i) => {
    const bx = i===0 ? 104 : 176, by = 163;
    g('iris-'+s).setAttribute('cx', (bx+dx).toFixed(2));
    g('iris-'+s).setAttribute('cy', (by+dy).toFixed(2));
    g('pupil-'+s).setAttribute('cx', (bx+dx).toFixed(2));
    g('pupil-'+s).setAttribute('cy', (by+dy).toFixed(2));
  });
}

// ============================================================
//  ANIMATION LOOP
// ============================================================
function animLoop(ts) {
  const dt = Math.min((ts-lastT)/1000, .05);
  lastT = ts;

  // — MOUTH —
  if (cs==='speaking') {
    speakT += dt;
    const fast  = Math.abs(Math.sin(speakT * 5.4));
    const slow  = 0.5 + 0.5 * Math.abs(Math.sin(speakT * 1.7));
    const burst = Math.abs(Math.sin(speakT * 3.2)) > 0.88 ? 1.25 : 1.0;
    tMouth = Math.min(1, fast * slow * burst * 0.95);
  } else tMouth = 0;
  mouth += (tMouth - mouth) * Math.min(1, dt * 22);
  updateMouth(mouth);

  // — BLINK —
  if (blinkAnim) {
    blinkAnim.t += dt;
    const h = blinkAnim.dur/2;
    blinkP = blinkAnim.t < h ? blinkAnim.t/h : 1-(blinkAnim.t-h)/h;
    blinkP = Math.max(0, Math.min(1, blinkP));
    if (blinkAnim.t >= blinkAnim.dur) { blinkAnim=null; blinkP=0; }
  }
  updateBlink(blinkP);

  // — EYE SACCADES —
  saccadeT += dt;
  if (saccadeT > 2.5 + Math.random()*2) {
    saccadeT = 0;
    const range = cs==='thinking' ? 5 : 3;
    eyeTarget = { x:(Math.random()-.5)*range*2, y:(Math.random()-.5)*range };
    if (cs==='thinking') { eyeTarget.y = -3 + Math.random()*2; }
    if (cs==='listening'){ eyeTarget = {x:0, y:-1}; }
  }
  eyeCur.x += (eyeTarget.x - eyeCur.x) * Math.min(1, dt*9);
  eyeCur.y += (eyeTarget.y - eyeCur.y) * Math.min(1, dt*9);
  updateEyes(eyeCur.x, eyeCur.y);

  requestAnimationFrame(animLoop);
}

// ============================================================
//  CHAT STATE
// ============================================================
function setCS(s) {
  cs = s;
  const map = { idle:'Ready', listening:'Listening…', thinking:'Thinking…', speaking:'Speaking…' };
  $status.textContent = map[s]||'';
  $ring.classList.toggle('on', s==='listening');
  $mic.classList.toggle('on', s==='listening');
  if (s==='idle')      eyeTarget={x:0,y:0};
  if (s==='thinking')  eyeTarget={x:3,y:-4};
  if (s==='listening') eyeTarget={x:0,y:-1};
}

function addBub(txt, role) {
  const d=document.createElement('div');
  d.className='bub '+role; d.textContent=txt;
  $chat.appendChild(d); $chat.scrollTop=$chat.scrollHeight;
  $hint.style.display='none';
}

// ============================================================
//  VOICE
// ============================================================
function getVoice() {
  const voices = window.speechSynthesis.getVoices();
  const fNames = ['zuzana','female','anna','samantha','victoria','karen','zira','tessa','eva','alice','fiona'];
  const pools = [
    voices.filter(v=>v.lang.startsWith('sk')),
    voices.filter(v=>v.lang.startsWith('cs')),
    voices.filter(v=>v.lang.startsWith('en')),
    voices
  ];
  for (const pool of pools) {
    const hit = pool.find(v=>fNames.some(n=>v.name.toLowerCase().includes(n)));
    if (hit) return hit;
  }
  for (const pool of pools) if (pool.length) return pool[0];
  return null;
}

function speak(txt) {
  if (!window.speechSynthesis) { setCS('idle'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.pitch = 1.18; u.rate = 0.94;
  const v = getVoice(); if (v) { u.voice=v; u.lang=v.lang; }
  u.onstart = () => { setCS('speaking'); speakT=0; };
  u.onend = u.onerror = () => setCS('idle');
  window.speechSynthesis.speak(u);
}

// ============================================================
//  CLAUDE API (via proxy)
// ============================================================
async function askClaude(txt) {
  setCS('thinking');
  addBub(txt,'user');
  chatHistory.push({role:'user',content:txt});
  if (chatHistory.length>8) chatHistory=chatHistory.slice(-8);

  try {
    const res = await fetch(CFG.proxyUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system:'You are a warm, thoughtful AI assistant. Reply in 1–3 conversational sentences. Respond in the language you are addressed in.',
        messages: chatHistory,
        max_tokens: 1000
      })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const reply = data.content?.find(b=>b.type==='text')?.text || '…';
    chatHistory.push({role:'assistant',content:reply});
    if (chatHistory.length>8) chatHistory=chatHistory.slice(-8);
    addBub(reply,'ai');
    speak(reply);
  } catch(e) { addBub('Error: '+e.message,'ai'); setCS('idle'); }
}

// ============================================================
//  STT
// ============================================================
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addBub('Speech recognition not supported. Use Chrome.','ai'); return; }
  recog = new SR();
  recog.lang='sk-SK'; recog.interimResults=false;
  recog.onstart  = ()=>setCS('listening');
  recog.onresult = e=>{ recog=null; askClaude(e.results[0][0].transcript); };
  recog.onerror  = ()=>{ recog=null; setCS('idle'); };
  recog.onend    = ()=>{ if(cs==='listening') setCS('idle'); };
  try { recog.start(); } catch { setCS('idle'); }
}

$mic.addEventListener('click', ()=>{
  if (cs==='speaking') { window.speechSynthesis?.cancel(); setCS('idle'); }
  else if (cs==='listening') { recog?.stop(); recog=null; setCS('idle'); }
  else if (cs==='idle') startListening();
});

window.speechSynthesis?.getVoices();
if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged=()=>{};
</script>
</body>
</html>
